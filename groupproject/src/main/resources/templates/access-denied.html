<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="page-shell center-page">
    <div class="message-card">
        <img th:src="@{/images/AirlineLogo.jpg}" alt="Access denied illustration" class="small-hero">
        <h1>Access Denied</h1>
        <p>You do not have permission to open that page.</p>
        <div class="button-row center-buttons">
            <a th:href="@{/employees/list}" class="primary-btn link-btn">Back to Employee List</a>
            <a th:href="@{/showMyLoginPage}" class="secondary-btn link-btn">Return to Login</a>
        </div>
    </div>
</body>

</html>
