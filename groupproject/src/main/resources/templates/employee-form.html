<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${employee.employeeId > 0 ? 'Update Employee' : 'Add Employee'}">Employee Form</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="page-shell">
	<header class="top-banner smaller-banner">
		<div>
			<p class="eyebrow">Jupiter Company</p>
			<h1 th:text="${employee.employeeId > 0 ? 'Update Employee' : 'Add Employee'}">Employee Form</h1>
			<p class="subtitle">All fields are required before saving to the database.</p>
		</div>

		<img th:src="@{/images/AirlineLogo.svg}" src="/images/AirlineLogo.svg" alt="Airline Logo" class="banner-image">
	</header>

	<section class="form-card">
		<form th:action="@{/employees/save}" th:object="${employee}" method="post" class="form-grid">

			<input type="hidden" th:field="*{employeeId}">

			<div th:if="${employee.employeeId > 0}">
				<label for="employeeIdDisplay">Employee ID</label>
				<input type="number" id="employeeIdDisplay" th:value="*{employeeId}" readonly>
			</div>

			<div>
				<label for="firstName">First Name</label>
				<input type="text" id="firstName" th:field="*{firstName}" required>
				<p class="field-error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></p>
			</div>

			<div>
				<label for="lastName">Last Name</label>
				<input type="text" id="lastName" th:field="*{lastName}" required>
				<p class="field-error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></p>
			</div>

			<div>
				<label for="salary">Start Salary</label>
				<input type="number" id="salary" th:field="*{salary}" step="0.01" min="0" required>
				<p class="field-error" th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"></p>
			</div>

			<div>
				<label for="startDate">Start Date</label>
				<input type="date" id="startDate" th:field="*{startDate}" required>
				<p class="field-error" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></p>
			</div>

			<div>
				<label for="employeeContractSigned">Contract Signed</label>
				<select id="employeeContractSigned" th:field="*{employeeContractSigned}" required>
					<option value="">-- Select Status --</option>
					<option th:value="true">Yes</option>
					<option th:value="false">No</option>
				</select>
				<p class="field-error" th:if="${#fields.hasErrors('employeeContractSigned')}"
					th:errors="*{employeeContractSigned}"></p>
			</div>

			<div>
				<label for="socialSecurityNumber">Social Security Number</label>
				<input type="text" id="socialSecurityNumber" th:field="*{socialSecurityNumber}" required>
				<p class="field-error" th:if="${#fields.hasErrors('socialSecurityNumber')}"
					th:errors="*{socialSecurityNumber}"></p>
			</div>

			<div>
				<label for="birthday">Birthdate</label>
				<input type="date" id="birthday" th:field="*{birthday}" required>
				<p class="field-error" th:if="${#fields.hasErrors('birthday')}" th:errors="*{birthday}"></p>
			</div>

			<div>
				<label for="phoneNumber">Phone Number</label>
				<input type="text" id="phoneNumber" th:field="*{phoneNumber}" required>
				<p class="field-error" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></p>
			</div>

			<div>
				<label for="emergencyContactName">Emergency Contact Name</label>
				<input type="text" id="emergencyContactName" th:field="*{emergencyContactName}" required>
				<p class="field-error" th:if="${#fields.hasErrors('emergencyContactName')}"
					th:errors="*{emergencyContactName}"></p>
			</div>

			<div>
				<label for="emergencyContactPhoneNumber">Emergency Contact Phone Number</label>
				<input type="text" id="emergencyContactPhoneNumber" th:field="*{emergencyContactPhoneNumber}" required>
				<p class="field-error" th:if="${#fields.hasErrors('emergencyContactPhoneNumber')}"
					th:errors="*{emergencyContactPhoneNumber}"></p>
			</div>

			<div class="full-width button-row">
				<button type="submit" class="primary-btn">Save</button>
				<a th:href="@{/employees/list}" class="secondary-btn link-btn">Back to List</a>
			</div>
		</form>
	</section>
</body>

</html>
