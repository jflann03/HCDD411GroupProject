<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Save Employee – Jupiter Company</title>
    <style>
        /* Shared Design Language */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #07111f;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: rgba(255,255,255,0.8);
            min-height: 100vh;
        }

        .top-bar {
            height: 4px;
            background: #0dcaf0;
        }

        .nav {
            background: #0d1e38;
            border-bottom: 0.5px solid rgba(255,255,255,0.08);
            padding: 12px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-brand { display: flex; align-items: center; gap: 10px; }
        .nav-icon {
            width: 30px; height: 30px;
            background: rgba(13,202,240,0.12);
            border: 0.5px solid rgba(13,202,240,0.35);
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-title { font-size: 14px; font-weight: 600; color: #fff; }
        .nav-sub { font-size: 11px; color: rgba(255,255,255,0.38); }

        .page-wrapper { max-width: 800px; margin: 0 auto; padding: 40px 20px; }

        .page-header { margin-bottom: 32px; }
        .page-header h1 { font-size: 24px; font-weight: 600; color: #fff; }
        .page-header p { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 4px; }

        /* Form Card */
        .form-card {
            background: #0d1e38;
            border: 0.5px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .form-group { margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(13,202,240,0.8);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 0.5px solid rgba(255,255,255,0.1);
            border-radius: 7px;
            padding: 10px 14px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .form-control:focus {
            border-color: #0dcaf0;
            box-shadow: 0 0 0 3px rgba(13,202,240,0.1);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.2); }

        /* Radio Styling */
        .radio-group { display: flex; gap: 20px; padding: 10px 0; }
        .radio-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .radio-item input[type="radio"] {
            accent-color: #0dcaf0;
            width: 16px; height: 16px;
        }
        .radio-label { font-size: 14px; color: rgba(255,255,255,0.7); }

        /* Validation Colors */
        .text-danger { color: #F09595; font-size: 11px; margin-top: 5px; font-weight: 500; }
        .alert-danger {
            background: rgba(226,75,74,0.1);
            border: 0.5px solid rgba(226,75,74,0.3);
            color: #F09595;
            padding: 12px 16px;
            border-radius: 7px;
            font-size: 13px;
            margin-bottom: 24px;
        }

        /* Buttons */
        .btn-container {
            display: flex; gap: 12px; margin-top: 32px;
            padding-top: 24px; border-top: 0.5px solid rgba(255,255,255,0.06);
        }
        .btn-save {
            background: #0dcaf0; color: #07111f;
            border: none; border-radius: 7px;
            padding: 10px 24px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: opacity 0.15s;
            text-decoration: none;
        }
        .btn-save:hover { opacity: 0.85; }
        
        .btn-back {
            background: transparent;
            border: 0.5px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5);
            border-radius: 7px;
            padding: 10px 20px; font-size: 14px;
            cursor: pointer; transition: all 0.15s;
            text-decoration: none; display: inline-flex; align-items: center;
        }
        .btn-back:hover { border-color: rgba(255,255,255,0.3); color: #fff; }

        /* Responsive */
        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>

<div class="top-bar"></div>

<nav class="nav">
    <div class="nav-brand">
        <div class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M2 10L6 6.5L9.5 8.5L14 4" stroke="#0dcaf0" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M9.5 8.5L13 6L14 7.2L10.5 10.5Z" fill="#0dcaf0" opacity="0.65"/>
            </svg>
        </div>
        <div>
            <div class="nav-title">Jupiter Company</div>
            <div class="nav-sub">Employee Management System</div>
        </div>
    </div>
</nav>

<div class="page-wrapper">
    <div class="page-header">
        <h1>Employee Record</h1>
        <p>Fill in the details below to add or update an employee in the directory.</p>
    </div>

    <div class="form-card">
        <form th:action="@{/employees/save}" th:object="${employee}" method="POST">
            
            <!-- Hidden field for updates -->
            <input type="hidden" th:field="*{employeeId}" />

            <!-- Global error message -->
            <div class="alert-danger" th:if="${#fields.hasAnyErrors()}">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="margin-right: 8px; vertical-align: middle;">
                    <circle cx="7" cy="7" r="6" stroke="#F09595" stroke-width="1.2"/>
                    <path d="M7 4v4M7 10h.01" stroke="#F09595" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                Please correct the highlighted errors and try again.
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" th:field="*{firstName}" class="form-control" placeholder="John">
                    <div class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" th:field="*{lastName}" class="form-control" placeholder="Doe">
                    <div class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="salary">Start Salary</label>
                    <input type="number" step="0.01" min="0" id="salary" th:field="*{salary}" class="form-control" placeholder="0.00">
                    <div class="text-danger" th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"></div>
                </div>
                <div class="form-group">
                    <label for="startDate">Start Date</label>
                    <input type="date" id="startDate" th:field="*{startDate}" class="form-control">
                    <div class="text-danger" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Contract Status</label>
                <div class="radio-group">
                    <label class="radio-item" for="contractYes">
                        <input type="radio" id="contractYes" th:field="*{employeeContractSigned}" value="true">
                        <span class="radio-label">Contract Signed</span>
                    </label>
                    <label class="radio-item" for="contractNo">
                        <input type="radio" id="contractNo" th:field="*{employeeContractSigned}" value="false">
                        <span class="radio-label">Pending</span>
                    </label>
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('employeeContractSigned')}" th:errors="*{employeeContractSigned}"></div>
            </div>

            <div class="form-group">
                <label for="socialSecurityNumber">Social Security Number</label>
                <input type="text" id="socialSecurityNumber" th:field="*{socialSecurityNumber}" class="form-control" placeholder="XXX-XX-XXXX">
                <div class="text-danger" th:if="${#fields.hasErrors('socialSecurityNumber')}" th:errors="*{socialSecurityNumber}"></div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="birthday">Birthdate</label>
                    <input type="date" id="birthday" th:field="*{birthday}" class="form-control">
                    <div class="text-danger" th:if="${#fields.hasErrors('birthday')}" th:errors="*{birthday}"></div>
                </div>
                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="text" id="phoneNumber" th:field="*{phoneNumber}" class="form-control" placeholder="(555) 000-0000">
                    <div class="text-danger" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="emergencyContactName">Emergency Contact Name</label>
                <input type="text" id="emergencyContactName" th:field="*{emergencyContactName}" class="form-control" placeholder="Full Name">
                <div class="text-danger" th:if="${#fields.hasErrors('emergencyContactName')}" th:errors="*{emergencyContactName}"></div>
            </div>

            <div class="form-group">
                <label for="emergencyContactPhoneNumber">Emergency Contact Phone</label>
                <input type="text" id="emergencyContactPhoneNumber" th:field="*{emergencyContactPhoneNumber}" class="form-control" placeholder="(555) 000-0000">
                <div class="text-danger" th:if="${#fields.hasErrors('emergencyContactPhoneNumber')}" th:errors="*{emergencyContactPhoneNumber}"></div>
            </div>

            <div class="btn-container">
                <button type="submit" class="btn-save">Save Employee</button>
                <a th:href="@{/employees/list}" class="btn-back">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
