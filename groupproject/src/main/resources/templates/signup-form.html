<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Employee Account</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="auth-page">
    <div class="auth-shell">
        <div class="auth-scene">
            <div class="auth-top-bar"></div>
            <div class="auth-city city-one"></div>
            <div class="auth-city city-two"></div>
            <div class="auth-plant left-plant"></div>
            <div class="auth-plant right-plant"></div>

            <div class="auth-art-panel">
                <img th:src="@{/images/AirlineLogo.svg}" alt="Employee portal illustration" class="auth-illustration">
            </div>
            <div class="auth-login-panel">
                <div class="login-card">
                    <h1 class="login-title">
                        <span>Create</span> Account
                    </h1>

                    <div th:if="${signupError}" class="alert error">
                        <span th:text="${signupError}">Signup error message</span>
                    </div>

                    <form th:action="@{/signup/processSignupForm}" method="post" class="login-form">
                        <div class="login-field">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" placeholder="Username" required>
                        </div>

                        <div class="login-field">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="**********" required>
                        </div>

                        <div class="login-field">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="**********"
                                required>
                        </div>

                        <button type="submit" class="primary-btn login-btn">Signup</button>

                        <a th:href="@{/}" class="secondary-auth-link">Home Page</a>
                    </form>
                </div>
            </div>

            <p class="auth-copyright">
                &copy; The Design is subjected to Copyright
            </p>
        </div>
    </div>
</body>

</html>
